---
- name: Deploy containers
  hosts: hp_server
  gather_facts: false
  become: true
  pre_tasks:
    - name: Kill and remove previous containers
      community.docker.docker_compose_v2:
        project_src: /srv/prod
        check_files_existing: false
        state: absent
        remove_images: all
        remove_orphans: true

  roles:
    - role: adguard
    - role: wg_easy
    - role: traefik
    - role: home_assistant
    - role: simon
    - role: ntfy
    - role: forgejo
    - role: forgejo_runner

  tasks:
    - name: Add Compose files to .env
      ansible.builtin.script:
        cmd: scripts/compose.sh
        chdir: /srv/prod

    - name: Start containers
      community.docker.docker_compose_v2:
        project_src: /srv/prod
        check_files_existing: false
        pull: always
        state: present
