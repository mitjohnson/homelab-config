---
- name: Copy docker-compose.yaml
  become: true
  ansible.builtin.copy:
    src: docker-compose.yaml
    dest: /srv/prod/docker-compose-wg-easy.yaml
    mode: "0600"

- name: Ensure required modules are loaded
  become: true
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - ip6_tables
    - ip_tables
