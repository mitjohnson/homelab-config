---

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    networks:
      - proxy
    volumes:
      - /srv/prod/wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wg-easy.tls=true"
      - "traefik.http.routers.wg-easy.rule=Host(`vpn.jhomelab.net`)"
      - "traefik.http.routers.wg-easy.entrypoints=https"
      - "traefik.http.routers.wg-easy.service=wg-easy"
      - "traefik.http.routers.wg-easy.middlewares=default-headers@file,compress@file"
      - "traefik.http.services.wg-easy.loadbalancer.server.port=51821"

networks:
  proxy:
    external: true
