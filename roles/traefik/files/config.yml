---
http:
  routers:
    adguard:
      entryPoints:
        - https
      rule: Host(`dns.jhomelab.net`)
      middlewares:
        - chain-internal
      tls: {}
      service: adguard
    home-assistant:
      entryPoints:
        - https
      rule: Host(`ha.jhomelab.net`)
      middlewares:
        - chain-internal
      tls: {}
      service: home-assistant
  services:
    adguard:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8080
        passHostHeader: true
    home-assistant:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8123
        passHostHeader: true
  middlewares:
    compress:
      compress: {}
    default-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        stsSeconds: 2592000
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex"
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
    local-ipwhitelist:
      ipAllowList:
        sourceRange:
          - "127.0.0.1/32"    # Localhost
          - "10.5.15.0/24"  
          - "172.16.0.0/12"   # Docker internal network
    sso:
      forwardAuth:
        address: http://ak-outpost-domain-forward-auth:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-entitlements
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
    chain-internal:
      chain:
        middlewares:
          - compress
          - default-headers
          - rate-limit
          - local-ipwhitelist
    chain-public:
      chain:
        middlewares:
          - compress
          - default-headers
          - rate-limit
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
      sniStrict: true
