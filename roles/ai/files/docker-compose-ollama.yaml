services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    networks:
      - proxy
    volumes:
      - /srv/prod/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.tls=true"
      - "traefik.http.routers.ollama.rule=Host(`ollama.jhomelab.net`)"
      - "traefik.http.routers.ollama.entrypoints=https"
      - "traefik.http.routers.ollama.service=ollama"
      - "traefik.http.routers.ollama.middlewares=default-headers@file"
      - "traefik.http.services.ollama.loadbalancer.server.port=8080"

networks:
  proxy:
    external: true
