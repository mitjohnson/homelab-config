---
- name: Ensure cron is installed
  ansible.builtin.package:
    name: cronie
    state: present
  become: true
  notify: Enable Cron
  when: ansible_facts['os_family'] == "Archlinux"

- name: Schedule automated security updates
  ansible.builtin.cron:
    name: "daily-maintenance-pull"
    minute: "30"
    hour: "4"
    job: >
      ansible-pull -U https://github.com/{{ github_user }}/homelab-config.git
      -i inventory/hosts.yml
      --vault-password-file /root/.ansible_vault_pass
      auto_updates.yml
      >> /var/log/ansible-maintenance.log 2>&1
  become: true
