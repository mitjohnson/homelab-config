---
- name: Ensure Ansible is installed
  ansible.builtin.package:
    name: "{{ 'ansible' if ansible_facts['os_family'] == 'Archlinux' else 'ansible-core' }}"
    state: present
  become: true

- name: Create Ansible Vault password file for automation
  ansible.builtin.copy:
    content: "{{ vault_password }}"
    dest: /root/.ansible_vault_pass
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true

- name: Ensure cron is installed
  ansible.builtin.package:
    name: cronie
    state: present
  become: true
  notify: Enable Cron
  when: ansible_facts['os_family'] == "Archlinux"

- name: Schedule automated security updates
  ansible.builtin.cron:
    name: "daily-maintenance-pull"
    minute: "30"
    hour: "4"
    job: >
      ansible-pull -U https://github.com/{{ github_user }}/homelab-config.git
      -C main
      -i "localhost,"
      --vault-password-file "/root/.ansible_vault_pass"
      playbooks/auto_updates.yml
      >> /var/log/ansible-maintenance.log 2>&1
  become: true
